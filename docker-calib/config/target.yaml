# FAST-Calib target geometry
# https://github.com/hku-mars/FAST-Calib
#
# Board coordinate frame (right-handed):
#   origin = bottom-left corner of the board (front face)
#   +X     = right along the board
#   +Y     = up along the board
#   +Z     = out of the board (toward the viewer)
#
# Physical board: 1.4 m x 1.0 m, 1/4" plywood, four Ø240 mm holes and four
# 200 mm ArUco markers (50 mm border to the board edges).
#
# Units: meters.

board:
  width:     1.40
  height:    1.00
  thickness: 0.00635   # 1/4 inch

aruco:
  # 8x8 printed cells = 6x6 data bits + 1-cell black border, so use a 6x6 dict.
  # Change the suffix if your markers were generated from a different dict size.
  dict: DICT_6X6_250
  marker_size: 0.20      # side length of each printed marker (m)
  # Marker centers in board frame. Each marker sits 50 mm from the nearest two
  # board edges, so its 0.20 m side is centered 0.15 m from those edges.
  # IDs follow FAST-Calib's hard-coded layout (qr_detect.hpp: boardIds {1,2,4,3}):
  #   ID 1 = top-left,  ID 2 = top-right,
  #   ID 3 = bottom-left, ID 4 = bottom-right.
  markers:
    - id: 1
      center: [0.15, 0.85]   # top-left
    - id: 2
      center: [1.25, 0.85]   # top-right
    - id: 3
      center: [0.15, 0.15]   # bottom-left
    - id: 4
      center: [1.25, 0.15]   # bottom-right

# Hole centers in board frame. The LiDAR detects these as low-density regions
# on the board plane (no returns through a hole). Diameter is used to size the
# 2D search kernel during detection.
# Centers sit 0.45 m from the left/right edges and 0.30 m from the top/bottom
# edges, giving 0.50 m horizontal and 0.40 m vertical spacing.
holes:
  diameter: 0.24
  centers:
    - [0.45, 0.30]
    - [0.95, 0.30]
    - [0.45, 0.70]
    - [0.95, 0.70]

# LiDAR-side detection knobs (used by calibrate_extrinsic.py).
lidar_detect:
  # Crop the cloud to a coarse box around the board in the LiDAR frame
  # (+X forward, +Y left, +Z up). Board sits ~1.83 m (6 ft) forward of the
  # LiDAR. The box is wider than the board on every axis so it tolerates
  # placement/tilt variation; tighten if walls or floor are leaking in.
  crop_xyz_min: [ 1.0, -1.0, -1.0]
  crop_xyz_max: [ 2.6,  1.0,  1.5]
  plane_ransac_distance: 0.02   # m, plane inlier threshold
  plane_min_inliers: 4500       # board is large and close -> lots of returns; safe floor
  accumulate_frames: 10         # stack N consecutive frames for density
  hole_density_threshold: 0.35  # cell occupancy below mean*this is a hole candidate
  # cluster_eps / cluster_min_samples are loaded but not currently used by the
  # extrinsic script (it does connected components on the hole mask instead).
  cluster_eps: 0.08
  cluster_min_samples: 4
