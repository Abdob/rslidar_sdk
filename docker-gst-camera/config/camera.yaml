/**:
  ros__parameters:
    # gscam2's input pipeline gets prepended to its own appsink. Don't include
    # the final ! appsink — gscam2 adds it. End the string with a sink-capable
    # element (videoconvert or a caps filter).
    #
    # The launch file replaces `gscam_config` based on use_gpu:=true|false;
    # the value below is just a sane default if the launch arg isn't honored.
    gscam_config: "v4l2src device=/dev/video0 ! image/jpeg,width=1280,height=720,framerate=30/1 ! nvjpegdec ! nvvideoconvert ! video/x-raw,format=RGB"
    image_encoding: "rgb8"
    frame_id: "camera"
    camera_name: "usb_cam"             # matches the name in intrinsics_ros.yaml
    camera_info_url: "file:///opt/calib/config/intrinsics_ros.yaml"
    preroll: false
    use_gst_timestamps: false
