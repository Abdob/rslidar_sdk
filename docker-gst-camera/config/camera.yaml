/**:
  ros__parameters:
    # gscam2's input pipeline gets prepended to its own appsink. Don't include
    # the final ! appsink — gscam2 adds it. End the string with a sink-capable
    # element (videoconvert or a caps filter).
    #
    # The launch file replaces `gscam_config` based on use_gpu:=true|false;
    # the value below is just a sane default if the launch arg isn't honored.
    gscam_config: "v4l2src device=/dev/video0 ! image/jpeg,width=1280,height=720,framerate=30/1 ! nvjpegdec ! nvvideoconvert ! video/x-raw,format=RGB"
    image_encoding: "rgb8"
    frame_id: "camera"
    camera_name: "usb_cam"             # matches the name in intrinsics_ros.yaml
    camera_info_url: "file:///opt/calib/config/intrinsics_ros.yaml"
    preroll: false
    # true: stamp each frame with the GStreamer buffer PTS (kernel capture time),
    # mapped into the ROS clock domain by gscam2's time_offset_. This is SMOOTH.
    # With false, gscam2 stamps node->now() at publish time, and the pipeline
    # (tee/queue/fpsdisplaysink) delivers frames in bursts -> clustered stamps
    # (measured std ~92% of the frame period, some frames sharing a stamp). That
    # jitter rode through image_restamp.py onto the lidar clock and caused the
    # FAST-LIVO2 colorization to ghost. Capture-time stamps fix it. NOTE: capture
    # time is earlier than publish time by a ~constant pipeline latency, so the
    # Kalibr cam_lidar_time_shift / img_time_offset must be re-tuned after this
    # change (it is only a constant now that the jitter is gone).
    use_gst_timestamps: true
