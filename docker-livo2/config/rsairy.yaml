# FAST-LIVO2 config for the RoboSense AIRY + fisheye USB camera rig.
# Topics, sensor type, and IMU model are AIRY-specific; the calibration
# blocks (extrin_calib, camera) are filled in from the YAMLs produced by
# this repo's calibration stages — keep both in sync.
#
# IMPORTANT: the rslidar_sdk in docker-calib/docker-ros2 must be built with
# POINT_TYPE=XYZIRT (done automatically in the patched Dockerfiles).

common:
  img_topic: "/image_raw"           # raw RGB from docker-gst-camera
  lid_topic: "/rslidar_points"      # AIRY 10 Hz cloud, XYZIRT
  imu_topic: "/rslidar_imu_data"    # AIRY built-in IMU, ~200 Hz
  img_en: 1
  lidar_en: 1
  ros_driver_bug_fix: false

extrin_calib:
  # IMU-to-LiDAR (T, R). RoboSense's AIRY datasheet places the IMU at
  # essentially the LiDAR origin with an identity rotation; if you have
  # the exact mechanical offset from RoboSense, paste it here.
  extrinsic_T: [0.0, 0.0, 0.0]
  extrinsic_R: [1, 0, 0,
                0, 1, 0,
                0, 0, 1]

  # Camera-to-LiDAR. From docker-calib/config/extrinsic.yaml (T_camera_lidar),
  # i.e. p_camera = Rcl @ p_lidar + Pcl. **Update these whenever you re-run
  # the extrinsic calibrator.**
  Rcl: [ 0.024485043361832017, -0.9996757544634111,    0.006990607239589806,
         0.9994660069030958,    0.024327358630524966, -0.021814689253834264,
         0.02163755292884905,   0.0075210079158857385, 0.9997375909423334]
  Pcl: [-0.0018595434946908213,
        -0.09821759136972955,
        -0.044799456977502206]

time_offset:
  # IMU is hardware-synced to the LiDAR, so 0.
  imu_time_offset: 0.0
  # Camera is USB, capture-to-stamp lag varies. 0.1 is FAST-LIVO2's
  # default for the Avia rig; refine with Kalibr (`--time-calibration`)
  # once you've recorded a wave-the-rig bag.
  img_time_offset: 0.1
  exposure_time_init: 0.0

preprocess:
  point_filter_num: 1               # keep every point; bump to 2-3 for speed
  filter_size_surf: 0.1
  lidar_type: 7                     # 7 = ROBOSENSE (see common_lib.h LID_TYPE enum)
  scan_line: 80                     # AIRY hemispherical: ~80 channels equivalent
  blind: 0.3                        # ignore returns inside 0.3 m

vio:
  max_iterations: 5
  outlier_threshold: 1000
  img_point_cov: 100
  patch_size: 8
  patch_pyrimid_level: 4
  normal_en: true
  raycast_en: false
  inverse_composition_en: false
  exposure_estimate_en: true
  inv_expo_cov: 0.1

imu:
  imu_en: true
  imu_int_frame: 30
  # AIRY's built-in IMU is similar grade to Avia's. Refine these via
  # allan_variance_ros if you want sub-mm map quality.
  acc_cov: 0.5
  gyr_cov: 0.3
  b_acc_cov: 0.0001
  b_gyr_cov: 0.0001

lio:
  max_iterations: 5
  dept_err: 0.02
  beam_err: 0.05
  min_eigen_value: 0.0025
  voxel_size: 0.5
  max_layer: 2
  max_points_num: 50
  layer_init_num: [5, 5, 5, 5, 5]

local_map:
  map_sliding_en: false
  half_map_size: 100
  sliding_thresh: 8

uav:
  imu_rate_odom: false
  gravity_align_en: false

publish:
  dense_map_en: true
  pub_effect_point_en: false
  pub_plane_en: false
  pub_scan_num: 1
  blind_rgb_points: 0.0

evo:
  seq_name: "rsairy_run"
  pose_output_en: false

pcd_save:
  pcd_save_en: true                 # save the colored cloud at end
  type: 0                           # 0 = world frame
  colmap_output_en: false
  filter_size_pcd: 0.05
  interval: -1                      # all frames in one file

image_save:
  img_save_en: false
  interval: 1
