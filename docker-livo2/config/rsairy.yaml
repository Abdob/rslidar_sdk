# FAST-LIVO2 config for the RoboSense AIRY + fisheye USB camera rig.
# Topics, sensor type, and IMU model are AIRY-specific; the calibration
# blocks (extrin_calib, camera) are filled in from the YAMLs produced by
# this repo's calibration stages — keep both in sync.
#
# IMPORTANT: the rslidar_sdk in docker-calib/docker-ros2 must be built with
# POINT_TYPE=XYZIRT (done automatically in the patched Dockerfiles).

common:
  img_topic: "/image_raw_synced"    # RGB from docker-gst-camera, restamped onto
                                    # the lidar hardware clock by image_restamp.py
                                    # (raw /image_raw is on the host clock)
  lid_topic: "/rslidar_points"      # AIRY 10 Hz cloud, XYZIRT
  imu_topic: "/rslidar_imu_data_fixed"  # bridged from /rslidar_imu_data
                                        # (g -> m/s^2, sensor-uptime ->
                                        # ROS clock). See
                                        # docker-calib/scripts/imu_bridge.py
  img_en: 1
  lidar_en: 1
  ros_driver_bug_fix: false

extrin_calib:
  # IMU-to-LiDAR (T, R). FACTORY value, read from the AIRY DIFOP packet (the
  # built-in IMU is NOT axis-aligned with the LiDAR; the datasheet "identity"
  # is wrong for this unit). It is a ~180 deg rotation: IMU x=-LiDAR y,
  # IMU y=-LiDAR x, IMU z=-LiDAR z. Cross-checks against gravity: LiDAR up (-X)
  # -> IMU +Y, matching the measured at-rest accel. To re-read it for another
  # unit, see the RS_INFO print added in rs_driver decoder_RSAIRY.hpp.
  extrinsic_T: [0.00425, 0.00418, -0.00446]
  extrinsic_R: [ 0.00370768, -0.999987,    0.0033864,
                -0.999925,   -0.00374694, -0.0116482,
                 0.0116607,  -0.00334295, -0.999926]

  # Camera-to-LiDAR. From docker-calib/config/extrinsic.yaml (T_camera_lidar),
  # i.e. p_camera = Rcl @ p_lidar + Pcl. **Update these whenever you re-run
  # the extrinsic calibrator.**
  Rcl: [ 0.024485043361832017, -0.9996757544634111,    0.006990607239589806,
         0.9994660069030958,    0.024327358630524966, -0.021814689253834264,
         0.02163755292884905,   0.0075210079158857385, 0.9997375909423334]
  Pcl: [-0.0018595434946908213,
        -0.09821759136972955,
        -0.044799456977502206]

time_offset:
  # IMU and LiDAR share the AIRY hardware clock (use_lidar_clock: true), so 0.
  imu_time_offset: 0.0
  # 0.0: the camera capture-to-stamp lag is now baked into the recorded
  # /image_raw_synced stamps by image_restamp.py (coarse host<->lidar offset +
  # the fine Kalibr cam_lidar_time_shift from docker-calib/config/time_sync.yaml).
  # Do NOT also set it here or the shift is applied twice.
  img_time_offset: 0.0
  exposure_time_init: 0.0

preprocess:
  point_filter_num: 1               # keep every point; bump to 2-3 for speed
  filter_size_surf: 0.1
  lidar_type: 7                     # 7 = ROBOSENSE (see common_lib.h LID_TYPE enum)
  scan_line: 80                     # AIRY hemispherical: ~80 channels equivalent
  blind: 0.3                        # ignore returns inside 0.3 m

vio:
  max_iterations: 5
  outlier_threshold: 1000
  img_point_cov: 100
  patch_size: 8
  patch_pyrimid_level: 4
  normal_en: true
  raycast_en: false
  inverse_composition_en: false
  exposure_estimate_en: true
  inv_expo_cov: 0.1

imu:
  imu_en: true
  imu_int_frame: 30
  # AIRY's built-in IMU is similar grade to Avia's. Refine these via
  # allan_variance_ros if you want sub-mm map quality.
  acc_cov: 0.5
  gyr_cov: 0.3
  b_acc_cov: 0.0001
  b_gyr_cov: 0.0001

lio:
  max_iterations: 5
  dept_err: 0.02
  beam_err: 0.05
  min_eigen_value: 0.0025
  voxel_size: 0.5
  max_layer: 2
  max_points_num: 50
  layer_init_num: [5, 5, 5, 5, 5]

local_map:
  map_sliding_en: false
  half_map_size: 100
  sliding_thresh: 8

uav:
  imu_rate_odom: false
  gravity_align_en: false

publish:
  dense_map_en: true
  pub_effect_point_en: false
  pub_plane_en: false
  pub_scan_num: 1
  blind_rgb_points: 0.0

evo:
  seq_name: "rsairy_run"
  pose_output_en: false

pcd_save:
  pcd_save_en: true                 # save the colored cloud at end
  type: 0                           # 0 = world frame
  colmap_output_en: false
  filter_size_pcd: 0.05
  interval: -1                      # all frames in one file

image_save:
  img_save_en: false
  interval: 1
